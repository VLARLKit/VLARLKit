<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="ah2" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Main Background -->
  <rect x="12" y="6" width="776" height="348" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="400" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.5">FRAMEWORK</text>

  <!-- Env Process Background -->
  <rect x="12" y="370" width="310" height="112" rx="14" fill="#fff1f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="167" y="392" text-anchor="middle" font-size="10" font-weight="700" fill="#fca5a5" letter-spacing="1">ENVIRONMENT PROCESS · SEPARATE</text>

  <!-- ===== COMPONENT BOXES ===== -->

  <!-- Runner -->
  <rect x="295" y="40" width="210" height="58" rx="10" fill="#6366f1"/>
  <text x="400" y="63" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Runner</text>
  <text x="400" y="79" text-anchor="middle" font-size="11" fill="#c7c8f8">vlarlkit/runners/</text>
  <text x="400" y="93" text-anchor="middle" font-size="11" fill="#a5a7f0">Orchestrates the training loop</text>

  <!-- Rollout -->
  <rect x="40" y="150" width="200" height="78" rx="10" fill="#0ea5e9"/>
  <text x="140" y="175" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Rollout</text>
  <text x="140" y="192" text-anchor="middle" font-size="11" fill="#b3e4f7">vlarlkit/rollouts/</text>
  <text x="140" y="209" text-anchor="middle" font-size="11" fill="#8ed5f2">Collects trajectories from env</text>

  <!-- Policy -->
  <rect x="560" y="150" width="200" height="78" rx="10" fill="#f59e0b"/>
  <text x="660" y="175" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Policy</text>
  <text x="660" y="192" text-anchor="middle" font-size="11" fill="#fde0a4">vlarlkit/policies/</text>
  <text x="660" y="209" text-anchor="middle" font-size="11" fill="#fcd27e">RL algorithm implementation</text>

  <!-- Model -->
  <rect x="305" y="275" width="190" height="62" rx="10" fill="#10b981"/>
  <text x="400" y="299" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Model</text>
  <text x="400" y="315" text-anchor="middle" font-size="11" fill="#a7f3d0">vlarlkit/models/</text>
  <text x="400" y="330" text-anchor="middle" font-size="11" fill="#6ee7b7">VLA backbone model</text>

  <!-- EnvClient -->
  <rect x="35" y="403" width="225" height="62" rx="10" fill="#ef4444"/>
  <text x="147" y="427" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">EnvClient</text>
  <text x="147" y="443" text-anchor="middle" font-size="11" fill="#fca5a5">env_clients/</text>
  <text x="147" y="458" text-anchor="middle" font-size="11" fill="#f87171">Environment server via ZMQ</text>

  <!-- ===== ARROWS ===== -->

  <!-- Runner → Rollout -->
  <path d="M 340 98 C 285 122, 218 130, 188 150" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- Runner → Policy -->
  <path d="M 460 98 C 515 122, 582 130, 612 150" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- Rollout → Policy (transitions) -->
  <line x1="240" y1="178" x2="558" y2="178" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="335" y="165" width="130" height="20" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">② transitions</text>

  <!-- Policy → Rollout (weight sync, dashed) -->
  <line x1="558" y1="205" x2="242" y2="205" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="7,4" marker-end="url(#ah2)"/>
  <rect x="335" y="192" width="130" height="20" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">④ weight sync</text>

  <!-- ③ label under Policy -->
  <text x="660" y="241" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">③ RL update</text>

  <!-- Rollout ↔ EnvClient (ZMQ) -->
  <line x1="108" y1="228" x2="108" y2="401" stroke="#64748b" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="170" y1="401" x2="170" y2="230" stroke="#64748b" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- Down label -->
  <rect x="32" y="302" width="72" height="34" rx="7" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="68" y="318" text-anchor="middle" font-size="10.5" font-weight="600" fill="#475569">① actions</text>
  <text x="68" y="331" text-anchor="middle" font-size="9" fill="#94a3b8">ZMQ</text>
  <!-- Up label -->
  <rect x="180" y="302" width="96" height="34" rx="7" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="228" y="318" text-anchor="middle" font-size="10.5" font-weight="600" fill="#475569">obs, rewards</text>
  <text x="228" y="331" text-anchor="middle" font-size="9" fill="#94a3b8">ZMQ</text>

  <!-- Model → Rollout (dotted, light) -->
  <path d="M 312 288 C 278 278, 258 254, 240 230" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah2)"/>
  <text x="258" y="266" text-anchor="middle" font-size="9.5" fill="#94a3b8" font-style="italic">actor copy</text>

  <!-- Model → Policy (dotted, light) -->
  <path d="M 488 288 C 522 278, 542 254, 560 230" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah2)"/>
  <text x="542" y="266" text-anchor="middle" font-size="9.5" fill="#94a3b8" font-style="italic">FSDP wrapped</text>

  <!-- ===== FLOW LEGEND ===== -->
  <rect x="488" y="370" width="295" height="112" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="393" font-size="12" font-weight="700" fill="#475569">Training Loop</text>
  <text x="510" y="412" font-size="11" fill="#64748b">① Rollout sends actions to env via ZMQ</text>
  <text x="510" y="429" font-size="11" fill="#64748b">② Collected transitions sent to policy</text>
  <text x="510" y="446" font-size="11" fill="#64748b">③ Policy computes RL update</text>
  <text x="510" y="463" font-size="11" fill="#64748b">④ Updated weights synced to actor model</text>
  <line x1="510" y1="470" x2="765" y2="470" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="480" font-size="9.5" fill="#94a3b8">Repeat ①→④ each training epoch</text>
</svg>
