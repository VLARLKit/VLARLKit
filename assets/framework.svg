<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="ah2" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Main Background -->
  <rect x="15" y="8" width="850" height="380" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="440" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.5">FRAMEWORK</text>

  <!-- Env Process Background -->
  <rect x="15" y="410" width="345" height="120" rx="16" fill="#fff1f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="187" y="434" text-anchor="middle" font-size="11" font-weight="700" fill="#fca5a5" letter-spacing="1">ENVIRONMENT PROCESS · SEPARATE</text>

  <!-- ===== COMPONENT BOXES ===== -->

  <!-- Runner -->
  <rect x="320" y="48" width="240" height="68" rx="12" fill="#6366f1"/>
  <text x="440" y="72" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Runner</text>
  <text x="440" y="89" text-anchor="middle" font-size="10" fill="#c7c8f8">vlarlkit/runners/</text>
  <text x="440" y="105" text-anchor="middle" font-size="10" fill="#a5a7f0">Orchestrates the training loop</text>

  <!-- Rollout -->
  <rect x="50" y="170" width="230" height="88" rx="12" fill="#0ea5e9"/>
  <text x="165" y="198" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Rollout</text>
  <text x="165" y="216" text-anchor="middle" font-size="10" fill="#b3e4f7">vlarlkit/rollouts/</text>
  <text x="165" y="234" text-anchor="middle" font-size="10" fill="#8ed5f2">Collects trajectories from environment</text>

  <!-- Policy -->
  <rect x="600" y="170" width="230" height="88" rx="12" fill="#f59e0b"/>
  <text x="715" y="198" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Policy</text>
  <text x="715" y="216" text-anchor="middle" font-size="10" fill="#fde0a4">vlarlkit/policies/</text>
  <text x="715" y="234" text-anchor="middle" font-size="10" fill="#fcd27e">RL algorithm implementation</text>

  <!-- Model -->
  <rect x="330" y="305" width="220" height="72" rx="12" fill="#10b981"/>
  <text x="440" y="330" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Model</text>
  <text x="440" y="348" text-anchor="middle" font-size="10" fill="#a7f3d0">vlarlkit/models/</text>
  <text x="440" y="366" text-anchor="middle" font-size="10" fill="#6ee7b7">VLA backbone model</text>

  <!-- EnvClient -->
  <rect x="50" y="445" width="270" height="72" rx="12" fill="#ef4444"/>
  <text x="185" y="470" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">EnvClient</text>
  <text x="185" y="488" text-anchor="middle" font-size="10" fill="#fca5a5">env_clients/</text>
  <text x="185" y="506" text-anchor="middle" font-size="10" fill="#f87171">Environment server via ZMQ</text>

  <!-- ===== ARROWS ===== -->

  <!-- Runner → Rollout -->
  <path d="M 370 116 C 310 142, 240 148, 210 170" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- Runner → Policy -->
  <path d="M 510 116 C 570 142, 640 148, 670 170" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- Rollout → Policy (transitions) -->
  <line x1="280" y1="200" x2="598" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="372" y="186" width="136" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="440" y="202" text-anchor="middle" font-size="10.5" font-weight="600" fill="#475569">② transitions</text>

  <!-- Policy → Rollout (weight sync, dashed) -->
  <line x1="598" y1="234" x2="282" y2="234" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="7,4" marker-end="url(#ah2)"/>
  <rect x="372" y="221" width="136" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="440" y="237" text-anchor="middle" font-size="10.5" font-weight="600" fill="#94a3b8">④ weight sync</text>

  <!-- ③ label under Policy -->
  <text x="715" y="272" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">③ RL update</text>

  <!-- Rollout ↔ EnvClient (ZMQ) -->
  <line x1="130" y1="258" x2="130" y2="443" stroke="#64748b" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="200" y1="443" x2="200" y2="260" stroke="#64748b" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- Down label -->
  <rect x="43" y="338" width="80" height="36" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="83" y="355" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">① actions</text>
  <text x="83" y="369" text-anchor="middle" font-size="9" fill="#94a3b8">ZMQ</text>
  <!-- Up label -->
  <rect x="208" y="338" width="105" height="36" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="355" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">obs, rewards</text>
  <text x="260" y="369" text-anchor="middle" font-size="9" fill="#94a3b8">ZMQ</text>

  <!-- Model → Rollout (dotted, light) -->
  <path d="M 340 318 C 300 305, 290 280, 280 260" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah2)"/>
  <text x="288" y="296" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">actor copy</text>

  <!-- Model → Policy (dotted, light) -->
  <path d="M 540 318 C 580 305, 592 280, 600 260" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ah2)"/>
  <text x="592" y="296" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">FSDP wrapped</text>

  <!-- ===== FLOW LEGEND ===== -->
  <rect x="548" y="410" width="312" height="120" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="570" y="434" font-size="11.5" font-weight="700" fill="#475569">Training Loop</text>
  <text x="570" y="454" font-size="10.5" fill="#64748b">① Rollout sends actions to env via ZMQ</text>
  <text x="570" y="471" font-size="10.5" fill="#64748b">② Collected transitions sent to policy</text>
  <text x="570" y="488" font-size="10.5" fill="#64748b">③ Policy computes RL update</text>
  <text x="570" y="505" font-size="10.5" fill="#64748b">④ Updated weights synced to actor model</text>
  <line x1="570" y1="513" x2="840" y2="513" stroke="#e2e8f0" stroke-width="1"/>
  <text x="570" y="525" font-size="9" fill="#94a3b8">Repeat ①→④ each training epoch</text>
</svg>
