defaults:
  - envs/libero_spatial@env.train
  - envs/libero_spatial@env.eval
  - models/pi05@model

hydra:
  run:
    dir: outputs/${runner.logger.experiment_name}/${now:%Y-%m-%d_%H-%M-%S}

algorithm:
  # SAC hyperparameters
  gamma: 0.999
  tau: 0.005
  backup_entropy: False
  agg_q: mean
  critic_actor_ratio: 1
  auto_entropy_tuning: True
  initial_alpha: 1.0
  target_entropy: -16
  alpha_lr: 3.0e-4
  alpha_clip_grad: 10.0

  # Training
  utd_ratio: 1.0
  global_warmup_steps: 1000
  global_replay_buffer_size: 100000
  global_batch_size: 512 # global_bs = (micro_bs * gradient_accumulation_steps) * world_size
  micro_batch_size: 64 # bs per rank & per forward pass
  queue_size: 4
  train_actor_steps: 10

  # Rollout
  rollout_epochs: 1
  eval_rollout_epochs: 25

env:
  env_client_host: "localhost"
  env_client_base_port: 5550
  train:
    seed: ${runner.seed}
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: False
    max_episode_steps: 240
    max_steps_per_rollout: 240
    reward_coef: 1.0
    use_rel_reward: False
    use_step_penalty: True
    use_ordered_reset_state_ids: True
    specific_reset_id: 0
  eval:
    seed: ${runner.seed}
    total_num_envs: 20
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout: 240
    group_size: 1
    is_eval: True
    use_step_penalty: True
    use_rel_reward: False

model:
  model_path: "/network/scratch/s/sunyi/rlinf_sft_models/RLinf-Pi05-LIBERO-SFT"
  num_action_chunks: 5
  action_dim: 7
  use_proprio: True
  num_steps: 10
  add_value_head: False

  openpi:
    use_dsrl: True
    dsrl_state_dim: 8
    dsrl_action_noise_dim: 32
    dsrl_num_q_heads: 10
    dsrl_image_latent_dim: 64
    dsrl_state_latent_dim: 64
    dsrl_hidden_dims: [128, 128, 128]
    train_expert_only: True
    noise_method: "reinflow"
    value_after_vlm: False

  data:
    name: "libero"
    repo_id: "physical-intelligence/libero" # does not matter, only assets_dir is used
    prompt_from_task: True
    assets_dir: "/network/scratch/s/sunyi/rlinf_sft_models/RLinf-Pi05-LIBERO-SFT/physical-intelligence/libero"
    extra_delta_transform: False

training:
  optim:
    lr: 1.0e-4            # actor (GaussianPolicy + actor encoders)
    value_lr: 3.0e-4       # critic (Q-head + critic encoders)
    clip_grad: 3.5         # actor gradient clipping
    critic_clip_grad: 10.0 # critic gradient clipping

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    forward_prefetch: False
    backward_prefetch: null
    mixed_precision:
      param_dtype: ${model.precision}
      reduce_dtype: ${model.precision}
      buffer_dtype: ${model.precision}

runner:
  seed: 42
  max_epochs: 200
  eval_interval: 10
  save_interval: 10
  resume_from: null
  is_debug: False
  logger:
    project: "VLARLKit"
    experiment_name: "libero_spatial_dsrl_pi05"
