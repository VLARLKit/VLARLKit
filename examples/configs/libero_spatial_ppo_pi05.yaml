defaults:
  - envs/libero_spatial@env.train
  - envs/libero_spatial@env.eval
  - models/pi05@model

hydra:
  run:
    dir: outputs/${runner.logger.experiment_name}/${now:%Y-%m-%d_%H-%M-%S}

algorithm:
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  group_size: 1
  reward_coef: 1.0
  rollout_epochs: 16
  eval_rollout_epochs: 25  # used when runner.eval_interval > 0

  update_epochs: 1
  minibatch_size: 512
  adv_type: gae
  loss_type: actor_critic
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  # params for generation
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  env_client_host: "localhost"
  env_client_base_port: 5550
  train:
    seed: ${runner.seed}
    total_num_envs: 32
    auto_reset: False
    ignore_terminations: False
    max_episode_steps: 240 # max episode steps for truncation
    max_steps_per_rollout: 240
    reward_coef: ${algorithm.reward_coef}
  eval:
    seed: ${runner.seed}
    total_num_envs: 20
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout: 240
    group_size: 1
    is_eval: True


model:
  model_path: "/network/scratch/s/sunyi/rlinf_sft_models/RLinf-Pi05-LIBERO-SFT"
  num_action_chunks: 5
  action_dim: 7
  use_proprio: True
  num_steps: 3
  add_value_head: True

  openpi:
    config_name: "pi05_libero"
    num_images_in_input: 2
    value_after_vlm: True

  data:
    name: "libero"
    repo_id: "physical-intelligence/libero" # does not matter, only assets_dir is used
    prompt_from_task: True
    assets_dir: "/network/scratch/s/sunyi/rlinf_sft_models/RLinf-Pi05-LIBERO-SFT/physical-intelligence/libero"
    extra_delta_transform: False


training:
  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0
    lr_scheduler: "constant" # Learning rate scheduler type. Choices: ["constant", "cosine"]. Default: "constant".
  
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    gradient_checkpointing: False # for openpi, gradient checkpointing is not supported, please do not change this value
    mixed_precision:
      param_dtype: ${model.precision}
      reduce_dtype: ${model.precision}
      buffer_dtype: ${model.precision}

runner:
  seed: 0
  max_epochs: 50
  eval_interval: 4
  is_debug: False # if True, it will not generate any log files
  logger:
    project: "VLARLKit"
    experiment_name: "libero_spatial_ppo_pi05"
