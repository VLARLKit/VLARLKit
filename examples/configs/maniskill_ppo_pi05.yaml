defaults:
  - envs/maniskill_put_on_plate_in_scene_25_main@env.train
  - envs/maniskill_put_on_plate_in_scene_25_main@env.eval
  - models/pi05_for_rl@model

hydra:
  run:
    dir: outputs/${runner.logger.experiment_name}/${now:%Y-%m-%d_%H-%M}

algorithm:
  agg_reward: sum
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  group_size: 1
  reward_coef: 1.0
  bootstrap_type: always  # standard (truncation only), always (truncation + termination)
  rollout_epochs: 1
  eval_rollout_epochs: 1  # used when runner.eval_interval > 0

  update_epochs: 5
  global_mini_batch_size: 5120 # global_mini_bs = (micro_bs * gradient_accumulation_steps) * world_size
  micro_batch_size: 32 # bs per rank per forward pass
  adv_type: gae
  loss_type: actor_critic
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

env:
  env_client_host: "localhost"
  env_client_base_port: 5550
  train:
    seed: ${runner.seed}
    total_num_envs: 320
    max_episode_steps: 80 # max episode steps for truncation
    reward_coef: ${algorithm.reward_coef}
  eval:
    seed: ${runner.seed}
    total_num_envs: 320
    max_episode_steps: 80
    group_size: 1
    use_fixed_reset_state_ids: True

model:
  model_path: "/network/scratch/s/sunyi/rlinf_sft_models/RLinf-Pi05-ManiSkill-25Main-SFT"
  num_action_chunks: 5
  action_dim: 7
  use_proprio: True
  num_steps: 4
  add_value_head: True

  openpi:
    config_name: "pi05_maniskill"
    num_images_in_input: 1
    value_after_vlm: True
    action_horizon: 8
    noise_method: "flow_noise"
    noise_params: [0.16, 0.12, 200]
    joint_logprob: True # False for flow_sde, True for flow_noise     

  data:
    name: "maniskill"
    repo_id: "physical-intelligence/maniskill" # does not matter, only assets_dir is used
    prompt_from_task: True
    assets_dir: "/network/scratch/s/sunyi/rlinf_sft_models/RLinf-Pi05-ManiSkill-25Main-SFT/physical-intelligence/maniskill"
    extra_delta_transform: False

  policy_setup: widowx_bridge

training:
  optim:
    lr: 8e-6
    value_lr: 1.5e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0
    lr_scheduler: "constant" # Learning rate scheduler type. Choices: ["constant", "cosine"]. Default: "constant".
  
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False # for openpi, gradient checkpointing is not supported, please do not change this value
    forward_prefetch: False
    backward_prefetch: null # options: null, "pre", "post"
    mixed_precision:
      param_dtype: ${model.precision}
      reduce_dtype: ${model.precision}
      buffer_dtype: ${model.precision}

runner:
  seed: 0
  max_epochs: 200
  eval_interval: 5
  save_interval: 10
  resume_from: null
  is_debug: False # if True, it will not generate any log files
  logger:
    project: "VLARLKit"
    experiment_name: "maniskill_ppo_pi05"
